<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поздравление</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="page">

        <div class="menu">
            <button>🖼 Галерея</button>
            <button>🎵 Плейлист</button>
            <button>💌 Telegram</button>
        </div>


        <div class="letter" id="letter">

            <div class="closed-letter">
                💌
                <p>Нажми, чтобы открыть</p>
            </div>


            <div class="opened-letter">

                <h1>Поздравление 💗</h1>

                <div class="text">

                    <p>
                        Здесь будет твой текст поздравления.
                    </p>

                    <p>
                        Можешь написать сюда всё, что хочешь сказать.
                    </p>

                    <p>
                        Это будет большое письмо с прокруткой.
                    </p>

                </div>

            </div>

        </div>

    </div>


    <script>
        const letter = document.getElementById("letter");

        letter.addEventListener("click", function () {
            letter.classList.toggle("open");
        });
    </script>


</body>

</html>
