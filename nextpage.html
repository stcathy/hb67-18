<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Письмо</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="page">

        <div class="menu">
            <button onclick="showLoader('gallery.html')">
                🖼 Галерея
            </button>

            <button>
                🎵 Плейлист
            </button>

            <button onclick="showLoader('https://t.me/flyffch')">
                💌 Telegram
            </button>
        </div>


        <div class="envelope" id="envelope">

            <div class="flap"></div>

            <div class="letter-paper">

                <h1>Поздравление 💗</h1>

                <div class="text">
                    <p>
                        Здесь будет твоё письмо.
                    </p>

                    <p>
                        Пока это только начало...
                    </p>
                </div>

            </div>

            <p class="open-text">
                Нажми, чтобы открыть 💌
            </p>

        </div>


    </div>


<script>

const envelope = document.getElementById("envelope");

envelope.addEventListener("click", function() {
    envelope.classList.add("opened");
});

</script>


</body>

</html>
