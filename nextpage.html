<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Письмо</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="page">

    <div class="menu">

        <button onclick="showLoader('gallery.html')">
            🖼 Галерея
        </button>

        <button onclick="openSecret()">
    💌 Секрет
</button>

        <button onclick="showLoader('https://t.me/flyffch')">
            💌 Telegram
        </button>

    </div>


  <div class="envelope" id="envelope">

    <div class="sparkles">
        <span>✨</span>
        <span>💗</span>
        <span>⭐</span>
        <span>💖</span>
        <span>✨</span>
        <span>♡</span>
    </div>


    <div class="flap"></div>


    <div class="letter-paper">

        <div class="book-page page1">

            <h1>Поздравление 💗</h1>

            <p>
                Здесь будет твоё письмо...
            </p>

            <button>
                Дальше →
            </button>

        </div>

    </div>


    <p class="open-text">
        Нажми, чтобы открыть 💌
    </p>


</div>


</div>


<script>

const envelope = document.getElementById("envelope");

envelope.addEventListener("click", function(){
    envelope.classList.add("opened");
});


function showLoader(url) {

    const loader = document.getElementById("loader");

    if(loader){
        loader.style.display = "flex";

        setTimeout(() => {
            window.location.href = url;
        }, 1500);

    } else {
        window.location.href = url;
    }

}
function openSecret() {
    document.getElementById("secret").style.display = "flex";
}


function closeSecret() {
    document.getElementById("secret").style.display = "none";
}
</script>

<div class="secret-box" id="secret">

    <div class="secret-content">

        <h2>💌 Секрет</h2>

        <p>
            Люблююю тебя больше всех на свете, Масенька
        </p>

        <button onclick="closeSecret()">
            Закрыть
        </button>

    </div>

</div>
</body>

</html>
