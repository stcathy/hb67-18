<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой сайт</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="modal" class="modal">

        <div class="modal-content">

            <img src="./bunny-love.gif" alt="cute bunny" class="gif">

            <p>Ты меня не ненавидишь???</p>

            <button id="yesBtn">Да ♡</button>
            <button id="noBtn">Нет</button>

        </div>

    </div>


   <script>

function showLoader(url) {
    const loader = document.getElementById('loader');

    loader.style.display = 'flex';

    setTimeout(() => {
        window.location.href = url;
    }, 1500);
}

const modal = document.getElementById('modal');
const yesBtn = document.getElementById('yesBtn');
const noBtn = document.getElementById('noBtn');

yesBtn.addEventListener('click', () => {
    showLoader('nextpage.html');
});

noBtn.addEventListener('click', () => {
    showLoader('no.html');
});

window.onload = () => {
    modal.style.display = 'block';
};

</script>
</body>
<div id="loader" class="loader">
    <img src="./catbb-gif.gif" alt="Loading">
    <p>Загрузка...</p>
</div>
</html>
